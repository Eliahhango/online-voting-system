<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Civic Ledger | Voter Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Public+Sans:wght@400;700&family=Manrope:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="stylesheet" href="../assets/css/global.css"/>
<link rel="stylesheet" href="../assets/css/components.css"/>
<link rel="stylesheet" href="../assets/css/auth.css"/>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col auth-shell">
<header class="auth-page-brand">
  <div class="auth-page-brand-inner">
    <div>
      <h1 class="font-headline text-4xl font-black tracking-tight mb-1">Civic Ledger</h1>
      <p class="font-label text-xs uppercase tracking-[0.2em]">Voter Access Portal</p>
    </div>
  </div>
</header>

<main class="flex-grow flex items-start justify-center px-4 py-8">
  <section class="w-full max-w-[520px] auth-card bg-white border rounded-xl overflow-hidden auth-plain-panel">

    <div class="px-8 py-10">
      <div class="mb-7">
        <h2 class="font-headline text-3xl font-extrabold mb-2">Sign In to Vote</h2>
        <p class="text-on-surface-variant text-[0.96rem]">Enter your government-issued credentials to access your secure ballot dashboard.</p>
      </div>

      <form class="space-y-5" novalidate>
        <div class="space-y-2">
          <label class="block font-label text-[0.78rem] font-bold uppercase tracking-[0.08em] text-on-surface" for="identifier">Email or Registration ID</label>
          <input class="w-full h-12 border border-outline-variant rounded-md px-4 text-on-surface font-inter font-medium outline-none" id="identifier" name="identifier" autocomplete="username" placeholder="Email or Registration ID" type="text"/>
          <a class="auth-inline-link text-[0.82rem]" href="./how-it-works.html">How to find your Registration ID</a>
        </div>

        <div class="space-y-2">
          <label class="block font-label text-[0.78rem] font-bold uppercase tracking-[0.08em] text-on-surface" for="password">Password</label>
          <input class="w-full h-12 border border-outline-variant rounded-md px-4 text-on-surface font-inter font-medium outline-none" id="password" name="password" autocomplete="current-password" placeholder="Enter your password" type="password"/>
        </div>

        <button class="w-full h-12 text-white font-headline font-bold uppercase tracking-[0.08em] rounded-md auth-submit-voter" type="submit">Sign In as Voter</button>
      </form>

      <div class="mt-7 pt-6 border-t border-outline-variant/20 flex flex-col gap-3 text-sm">
        <p class="text-on-surface-variant">Need admin access? <a class="auth-inline-link" href="./admin-login.html">Go to Admin Login</a></p>
        <p class="text-on-surface-variant">No account yet? <a class="auth-inline-link" href="./signup.html">Create voter account</a></p>
      </div>
    </div>
  </section>
</main>

<script defer src="../assets/js/utils.js"></script>
<script defer src="../assets/js/auth.js"></script>
<script defer src="../assets/js/main.js"></script>
</body>
</html>
