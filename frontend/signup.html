<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Civic Ledger | Voter Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Public+Sans:wght@400;700&family=Manrope:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="stylesheet" href="../assets/css/global.css"/>
<link rel="stylesheet" href="../assets/css/components.css"/>
<link rel="stylesheet" href="../assets/css/auth.css"/>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col auth-shell">
<header class="auth-page-brand">
    <div class="auth-page-brand-inner">
        <div>
            <h1 class="font-headline text-4xl font-black tracking-tight mb-1">Civic Ledger</h1>
            <p class="font-label text-xs uppercase tracking-[0.2em]">Voter Registration Portal</p>
        </div>
    </div>
</header>

<main class="flex-grow flex items-start justify-center px-4 py-8">
    <section class="w-full max-w-[620px] auth-card bg-white border rounded-xl overflow-hidden auth-plain-panel">

        <div class="px-8 py-10">
            <div class="mb-7">
                <h2 class="font-headline text-3xl font-extrabold mb-2">Create Voter Account</h2>
                <p class="text-on-surface-variant text-[0.96rem]">Register once to securely access upcoming elections and your ballot dashboard.</p>
            </div>

            <form class="space-y-5" novalidate>
                <div class="space-y-2">
                    <label class="block font-label text-[0.78rem] font-bold uppercase tracking-[0.08em] text-on-surface" for="full_name">Full Name</label>
                    <input class="w-full h-12 border border-outline-variant rounded-md px-4 text-on-surface font-inter font-medium outline-none" id="full_name" name="full_name" placeholder="John Doe" type="text"/>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="block font-label text-[0.78rem] font-bold uppercase tracking-[0.08em] text-on-surface" for="email">Email</label>
                        <input class="w-full h-12 border border-outline-variant rounded-md px-4 text-on-surface font-inter font-medium outline-none" id="email" name="email" placeholder="name@example.com" type="email"/>
                    </div>
                    <div class="space-y-2">
                        <label class="block font-label text-[0.78rem] font-bold uppercase tracking-[0.08em] text-on-surface" for="phone">Phone (Optional)</label>
                        <input class="w-full h-12 border border-outline-variant rounded-md px-4 text-on-surface font-inter font-medium outline-none" id="phone" name="phone" placeholder="+1 555 000 0000" type="tel"/>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block font-label text-[0.78rem] font-bold uppercase tracking-[0.08em] text-on-surface" for="voter_id">Registration ID</label>
                    <input class="w-full h-12 border border-outline-variant rounded-md px-4 text-on-surface font-inter font-medium outline-none" id="voter_id" name="voter_id" placeholder="Auto-generated after signup" type="text" readonly/>
                    <p class="text-[0.78rem] text-on-surface-variant">This ID is generated automatically after successful account creation.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="block font-label text-[0.78rem] font-bold uppercase tracking-[0.08em] text-on-surface" for="password">Password</label>
                        <input class="w-full h-12 border border-outline-variant rounded-md px-4 text-on-surface font-inter font-medium outline-none" id="password" name="password" placeholder="Create a strong password" type="password"/>
                    </div>
                    <div class="space-y-2">
                        <label class="block font-label text-[0.78rem] font-bold uppercase tracking-[0.08em] text-on-surface" for="confirm_password">Confirm Password</label>
                        <input class="w-full h-12 border border-outline-variant rounded-md px-4 text-on-surface font-inter font-medium outline-none" id="confirm_password" name="confirm_password" placeholder="Repeat your password" type="password"/>
                    </div>
                </div>

                <label class="flex items-start gap-3 text-sm text-on-surface-variant">
                    <input class="mt-1 h-4 w-4" id="terms" name="terms" type="checkbox"/>
                    <span>I agree to the <a class="auth-inline-link" href="#">Privacy Policy</a> and <a class="auth-inline-link" href="#">Terms of Use</a>.</span>
                </label>

                <button class="w-full h-12 text-white font-headline font-bold uppercase tracking-[0.08em] rounded-md auth-submit-voter" type="submit">Create Account</button>

                <p class="text-sm text-on-surface-variant text-center">Already have an account? <a class="auth-inline-link" href="voter-login.html">Sign in to voter portal</a></p>
            </form>
        </div>
    </section>
</main>

<script defer src="../assets/js/utils.js"></script>
<script defer src="../assets/js/auth.js"></script>
<script defer src="../assets/js/main.js"></script>
</body>
</html>
